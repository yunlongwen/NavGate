services:
  navgate:
    image: navgate:latest
    ports:
      - '80:80'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin123}
      - JSON_DB_PATH=/app/data/nav-data.json
    volumes:
      - navgate_data:/app/data

volumes:
  navgate_data:
