name: Deploy to GitHub Pages

on:
  push:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm --filter frontend build
        env:
          # ============================================
          # 存储模式配置 / Storage Mode Configuration
          # ============================================
          #
          # 选项 1: localStorage 模式（默认）
          # Option 1: localStorage Mode (Default)
          # - 数据存储在浏览器 / Data stored in browser
          # - 无跨设备同步 / No cross-device sync
          # - 零配置 / Zero configuration
          # VITE_DEPLOY_MODE: github-pages
          #
          # 选项 2: GitHub Gist 模式（推荐）⭐
          # Option 2: GitHub Gist Mode (Recommended) ⭐
          # - 跨设备同步 / Cross-device sync
          # - 版本历史 / Version history
          # - 需要配置 GitHub Secrets / Requires GitHub Secrets
          #
          # 启用 Gist 模式，取消注释以下 3 行：
          # To enable Gist mode, uncomment these 3 lines:
          #
          VITE_DEPLOY_MODE: gist
          VITE_GIST_ID: ${{ secrets.VITE_GIST_ID }}
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
          #
          # ============================================
          # 管理员配置 / Admin Configuration
          # ============================================
          # 在仓库 Secrets 中添加 / Add to repository Secrets:
          #   - VITE_ADMIN_USERNAME
          #   - VITE_ADMIN_PASSWORD
          VITE_ADMIN_USERNAME: ${{ secrets.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          #
          # 设置步骤 / Setup Steps:
          # 1. 创建 GitHub Token (gist 权限) / Create GitHub Token (gist scope)
          # 2. 创建 Gist 存储数据 / Create Gist for data storage
          # 3. 在仓库添加 Secrets / Add Secrets to repository:
          #    - VITE_GIST_ID
          #    - VITE_GITHUB_TOKEN
          # 4. 详见 DEPLOYMENT_MODES.md / See DEPLOYMENT_MODES.md for details

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './apps/frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
