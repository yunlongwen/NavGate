name: Build and Push Docker Image

on:
  push:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: 'docker'
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/navgate
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update docker-compose.yml with new tag
        run: |
          # Update the docker-compose.yml file with the latest tag
          sed -i 's|image: .*/navgate.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/navgate:latest|g' docker/docker-compose.yml

      - name: Commit updated docker-compose.yml
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add docker/docker-compose.yml
          git commit -m 'chore: update docker-compose.yml with latest tag' || echo 'No changes to commit'
          git push || echo 'No changes to push'
